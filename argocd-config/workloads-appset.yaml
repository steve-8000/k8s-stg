apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/steve-8000/clab-trade.git
        revision: main
        directories:
          - path: k8s-deploy/*
  template:
    metadata:
      name: "{{ .path.basename }}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: workloads
        app.kubernetes.io/managed-by: applicationset
    spec:
      project: workloads
      source:
        repoURL: https://github.com/steve-8000/clab-trade.git
        targetRevision: main
        path: "{{ .path.path }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{ .path.basename }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
