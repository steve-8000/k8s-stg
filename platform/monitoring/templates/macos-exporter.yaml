apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: macos-node-exporter
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/component: external-exporter
    app.kubernetes.io/part-of: monitoring
    release: monitoring
spec:
  jobName: node-exporter-macos
  metricsPath: /metrics
  scrapeInterval: 30s
  honorLabels: true
  staticConfigs:
    - targets:
        - 219.255.103.226:9100
      labels:
        instance: steve-macbook
        hostname: Mac-M4M
        os: darwin
        node_role: workstation
