apiVersion: v1
kind: Service
metadata:
  name: macos-node-exporter
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/component: external-exporter
    app.kubernetes.io/part-of: monitoring
spec:
  ports:
    - name: metrics
      port: 9100
      protocol: TCP
      targetPort: 9100
---
apiVersion: v1
kind: Endpoints
metadata:
  name: macos-node-exporter
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/component: external-exporter
    app.kubernetes.io/part-of: monitoring
subsets:
  - addresses:
      - ip: 219.255.103.226
    ports:
      - name: metrics
        port: 9100
        protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: macos-node-exporter
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/component: external-exporter
    app.kubernetes.io/part-of: monitoring
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - monitoring
  selector:
    matchLabels:
      app.kubernetes.io/name: macos-node-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      honorLabels: true
      relabelings:
        - targetLabel: job
          replacement: node-exporter-macos
        - targetLabel: instance
          replacement: steve-macbook
