kube-prometheus-stack:
  ## Grafana
  grafana:
    adminPassword: admin123!
    defaultDashboardsTimezone: Asia/Seoul
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - grafana.clab.one
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.clab.one
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    sidecar:
      dashboards:
        searchNamespace: ALL

  ## Prometheus
  prometheus:
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - prometheus.clab.one
      tls:
        - secretName: prometheus-tls
          hosts:
            - prometheus.clab.one
    prometheusSpec:
      additionalScrapeConfigs:
        - job_name: "node-exporter-macos"
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: ["219.255.103.189:9102"]
              labels:
                instance: "steve-macbook"
      retention: 15d
      retentionSize: 10GB
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false

  ## Alertmanager
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

  ## Node Exporter
  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  ## Kube State Metrics
  kube-state-metrics:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  ## Prometheus Operator
  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    admissionWebhooks:
      patch:
        ttlSecondsAfterFinished: 5
