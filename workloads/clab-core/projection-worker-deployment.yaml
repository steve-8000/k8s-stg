apiVersion: apps/v1
kind: Deployment
metadata:
  name: projection-worker
  namespace: clab-core
  labels:
    app.kubernetes.io/name: projection-worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: projection-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: projection-worker
    spec:
      containers:
        - name: projection-worker
          image: clab-trade/projection-worker:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: PROJECTION_WORKER_HTTP_ADDR
              value: :8094
            - name: PROJECTION_WORKER_POSTGRES_DSN
              value: postgres://postgres:postgres@postgres.clab-data.svc.cluster.local:5432/clab_trade?sslmode=disable
            - name: PROJECTION_WORKER_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: PROJECTION_WORKER_CONSUMER
              value: projection-worker
            - name: PROJECTION_WORKER_PUBLISH_STREAM
              value: PROJECTION_UPDATES
          ports:
            - name: http
              containerPort: 8094
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
