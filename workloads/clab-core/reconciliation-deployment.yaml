apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciliation
  namespace: clab-core
  labels:
    app.kubernetes.io/name: reconciliation
    app.kubernetes.io/instance: reconciliation-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: reconciliation
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reconciliation
        app.kubernetes.io/instance: reconciliation-stg
    spec:
      containers:
        - name: reconciliation
          image: clab-trade/reconciliation:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: RECONCILIATION_HTTP_ADDR
              value: :8089
            - name: RECONCILIATION_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: RECONCILIATION_EXECUTION_SOURCE_STREAM
              value: EXECUTION_EVENT_DATA
            - name: RECONCILIATION_PORTFOLIO_SOURCE_STREAM
              value: PORTFOLIO_DATA
            - name: RECONCILIATION_CONSUMER
              value: reconciliation
          ports:
            - name: http
              containerPort: 8089
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
