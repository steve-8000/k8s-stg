apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: clab-core
  labels:
    app.kubernetes.io/name: query-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: query-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: query-api
    spec:
      containers:
        - name: query-api
          image: clab-trade/query-api:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: QUERY_API_HTTP_ADDR
              value: :8091
            - name: QUERY_API_POSTGRES_DSN
              value: postgres://postgres:postgres@postgres.clab-data.svc.cluster.local:5432/clab_trade?sslmode=disable
            - name: QUERY_API_PORTFOLIO_STATE_URL
              value: http://portfolio-canonical-state.clab-core.svc.cluster.local
            - name: QUERY_API_PROMOTION_GATE_URL
              value: http://promotion-gate.clab-core.svc.cluster.local
            - name: QUERY_API_REALTIME_CHANNEL_BASE
              value: ws://realtime-gateway.clab-core.svc.cluster.local/ws
          ports:
            - name: http
              containerPort: 8091
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
