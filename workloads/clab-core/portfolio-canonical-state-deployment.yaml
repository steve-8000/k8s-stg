apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-canonical-state
  namespace: clab-core
  labels:
    app.kubernetes.io/name: portfolio-canonical-state
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-canonical-state
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-canonical-state
    spec:
      containers:
        - name: portfolio-canonical-state
          image: clab-trade/portfolio-canonical-state:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: PORTFOLIO_CANONICAL_STATE_HTTP_ADDR
              value: :8090
            - name: PORTFOLIO_CANONICAL_STATE_POSTGRES_DSN
              value: postgres://postgres:postgres@postgres.clab-data.svc.cluster.local:5432/clab_trade?sslmode=disable
            - name: PORTFOLIO_CANONICAL_STATE_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
