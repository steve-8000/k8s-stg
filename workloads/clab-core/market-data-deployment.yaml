apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  namespace: clab-core
  labels:
    app.kubernetes.io/name: market-data
    app.kubernetes.io/instance: market-data-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: market-data
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-data
        app.kubernetes.io/instance: market-data-stg
    spec:
      containers:
        - name: market-data
          image: clab-trade/market-data:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: MARKET_DATA_HTTP_ADDR
              value: :8080
            - name: MARKET_DATA_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: MARKET_DATA_POSTGRES_ADDR
              value: postgres.clab-data.svc.cluster.local:5432
            - name: MARKET_DATA_TIMESCALE_ADDR
              value: timescaledb.clab-data.svc.cluster.local:5432
            - name: MARKET_DATA_REDIS_ADDR
              value: redis.clab-data.svc.cluster.local:6379
            - name: MARKET_DATA_MINIO_HEALTH_URL
              value: http://minio.clab-data.svc.cluster.local:9000/minio/health/live
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
