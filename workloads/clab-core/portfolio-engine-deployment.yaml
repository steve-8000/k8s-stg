apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-engine
  namespace: clab-core
  labels:
    app.kubernetes.io/name: portfolio-engine
    app.kubernetes.io/instance: portfolio-engine-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-engine
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-engine
        app.kubernetes.io/instance: portfolio-engine-stg
    spec:
      containers:
        - name: portfolio-engine
          image: clab-trade/portfolio-engine:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: PORTFOLIO_ENGINE_HTTP_ADDR
              value: :8083
            - name: PORTFOLIO_ENGINE_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: PORTFOLIO_ENGINE_SOURCE_STREAM
              value: SIGNAL_DATA
            - name: PORTFOLIO_ENGINE_CONSUMER
              value: portfolio-engine
            - name: PORTFOLIO_ENGINE_PORTFOLIO_ID
              value: main
            - name: PORTFOLIO_ENGINE_STARTING_CAPITAL_USD
              value: "1000"
            - name: PORTFOLIO_ENGINE_RESERVE_PER_SIGNAL_USD
              value: "10"
          ports:
            - name: http
              containerPort: 8083
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
