apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-manager
  namespace: clab-core
  labels:
    app.kubernetes.io/name: order-manager
    app.kubernetes.io/instance: order-manager-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: order-manager
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-manager
        app.kubernetes.io/instance: order-manager-stg
    spec:
      containers:
        - name: order-manager
          image: clab-trade/order-manager:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: ORDER_MANAGER_HTTP_ADDR
              value: :8087
            - name: ORDER_MANAGER_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: ORDER_MANAGER_CONTROL_SERVICE_URL
              value: http://control-service.clab-apps.svc.cluster.local
            - name: ORDER_MANAGER_SOURCE_STREAM
              value: APPROVED_ORDER_DATA
            - name: ORDER_MANAGER_COMMAND_STREAM
              value: EXECUTION_COMMAND_DATA
            - name: ORDER_MANAGER_CONSUMER
              value: order-manager
          ports:
            - name: http
              containerPort: 8087
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
