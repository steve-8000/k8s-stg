apiVersion: v1
kind: ConfigMap
metadata:
  name: trader-web-assets
  namespace: clab-core
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CLAB Trade Control System</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./styles.css">
      </head>
      <body>
        <div class="backdrop"></div>
        <div class="noise"></div>
        <main class="shell control-shell">
          <header class="topbar panel">
            <div>
              <p class="eyebrow">trade.clab.one</p>
              <div class="brand-row">
                <h1>CLAB Trade</h1>
                <span class="badge static-badge">operator control system</span>
              </div>
              <p class="lead compact-lead">Query snapshot, governed command posture, and realtime observation are shown separately so operators can see stale or ambiguous state instead of hidden smoothing.</p>
            </div>
            <div class="topbar-meta">
              <div class="meta-chip"><span class="meta-label">environment</span><strong id="env-chip">staging</strong></div>
              <div class="meta-chip"><span class="meta-label">venue</span><strong id="venue-chip">binance</strong></div>
              <div class="meta-chip pulse-chip"><span class="pulse-dot"></span><span id="poll-state">connecting realtime</span></div>
              <div class="meta-chip"><span class="meta-label">freshness</span><strong id="freshness-chip">--</strong></div>
              <div class="meta-chip"><span class="meta-label">kill switch</span><strong id="kill-switch-chip">DEGRADED</strong></div>
              <div class="auth-chip">
                <div class="auth-chip-head">
                  <span class="meta-label">session</span>
                  <strong id="auth-session-state">locked</strong>
                </div>
                <div class="auth-chip-form">
                  <input id="auth-username-input" type="text" placeholder="operator">
                  <input id="auth-password-input" type="password" placeholder="password">
                  <button id="auth-login-button" type="button">Sign in</button>
                  <button id="auth-step-up-button" type="button">Step up</button>
                  <button id="auth-logout-button" type="button">Sign out</button>
                </div>
                <p class="auth-chip-detail" id="auth-session-detail">Sign in to unlock protected queries.</p>
                <div class="data-list auth-permissions-list" id="auth-permissions-list"></div>
              </div>
            </div>
          </header>
    
          <section class="banner-panel panel" id="stale-banner">
            <strong id="stale-banner-title">Realtime syncing</strong>
            <p id="stale-banner-copy">Dashboard is waiting for the first Query API snapshot and realtime update stream.</p>
          </section>
    
          <section class="control-grid">
            <aside class="rail rail-left panel">
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Control and health</p><h3>Account health</h3></div><span class="badge" id="account-health-badge">loading</span></div>
                <div class="data-list" id="account-health-list"></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Strategy runtime</p><h3>Promotion and signal posture</h3></div><span class="badge" id="strategy-runtime-badge">loading</span></div>
                <div class="data-list" id="strategy-runtime-list"></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Incident center</p><h3>Unresolved events</h3></div><span class="badge" id="incident-badge">0 open</span></div>
                <div class="data-list" id="incident-list"></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Approval queue</p><h3>Proposal review</h3></div><span class="badge" id="approval-badge">loading</span></div>
                <div class="data-list" id="proposal-queue-list"></div>
                <label class="command-form-field">
                  <span>Review reason</span>
                  <input id="proposal-reason-input" type="text" placeholder="Required for reject, optional for hold">
                </label>
                <div class="command-stack compact-stack">
                  <button class="command-button" type="button" id="proposal-approve-button">Approve</button>
                  <button class="command-button" type="button" id="proposal-hold-button">Hold</button>
                  <button class="command-button danger" type="button" id="proposal-reject-button">Reject</button>
                </div>
                <p class="command-observed" id="proposal-review-state">No proposal selected.</p>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Review audit</p><h3>Recent decisions</h3></div><span class="badge" id="proposal-history-badge">0 items</span></div>
                <div class="data-list" id="proposal-history-list"></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Emergency controls</p><h3>Governed commands</h3></div><span class="badge">observed</span></div>
                <div class="command-stack">
                  <button class="command-button" type="button" data-command="start" disabled>Start strategy (planned)</button>
                  <button class="command-button" type="button" data-command="pause" disabled>Pause strategy (planned)</button>
                  <button class="command-button" type="button" data-command="reconcile" disabled>Request reconciliation (planned)</button>
                  <button class="command-button danger" type="button" data-command="cancel-all">Cancel all</button>
                  <button class="command-button danger" type="button" data-command="flatten">Flatten positions</button>
                  <button class="command-button danger" type="button" data-command="kill-switch">Arm kill switch</button>
                  <button class="command-button" type="button" data-command="kill-switch-release">Release kill switch</button>
                </div>
                <p class="command-observed" id="command-observed">Observed state: waiting for command submission. These actions are wired to the current control-service intake path; downstream execution effects may still lag or remain observational.</p>
              </div>
            </aside>
    
            <section class="rail rail-center panel">
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Lifecycle and blotter</p><h3>Order lineage</h3></div><span class="badge" id="orders-badge">0 rows</span></div>
                <div class="table-wrap"><table class="data-table"><thead><tr><th>Order</th><th>Signal</th><th>State</th><th>Pending</th></tr></thead><tbody id="orders-table-body"></tbody></table></div>
              </div>
              <div class="rail-section detail-surface">
                <div class="panel-header"><div><p class="section-kicker">Selected order</p><h3>Timeline and truth split</h3></div><span class="badge" id="order-detail-badge">idle</span></div>
                <div class="detail-grid dual-detail">
                  <div><dt>Lifecycle</dt><dd id="order-detail-timeline">No order selected</dd></div>
                  <div><dt>Execution truth</dt><dd id="order-detail-execution">No order selected</dd></div>
                  <div><dt>Portfolio truth</dt><dd id="order-detail-portfolio">No order selected</dd></div>
                  <div><dt>Reconciliation</dt><dd id="order-detail-recon">No order selected</dd></div>
                </div>
              </div>
              <div class="rail-section tabbed-surface">
                <div class="panel-header"><div><p class="section-kicker">Workbench tabs</p><h3>Signals, reconciliation, strategy</h3></div><span class="badge" id="tab-badge">snapshot</span></div>
                <div class="tab-grid">
                  <div class="tab-card"><strong>Signals</strong><p id="signals-tab-copy">Waiting for strategy data.</p></div>
                  <div class="tab-card"><strong>Reconciliation</strong><p id="recon-tab-copy">Waiting for reconciliation status.</p></div>
                  <div class="tab-card"><strong>Strategy</strong><p id="strategy-tab-copy">Waiting for promotion gate decisions.</p></div>
                </div>
              </div>
            </section>
    
            <aside class="rail rail-right panel">
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Positions and risk</p><h3>Risk badge bar</h3></div><span class="badge" id="risk-badge">watch</span></div>
                <div class="badge-bar" id="risk-badge-bar"></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Open positions</p><h3>Live position risk</h3></div><span class="badge" id="positions-badge">0 positions</span></div>
                <div class="table-wrap"><table class="data-table"><thead><tr><th>Symbol</th><th>Qty</th><th>PnL</th><th>Risk</th></tr></thead><tbody id="positions-table-body"></tbody></table></div>
              </div>
              <div class="rail-section">
                <div class="panel-header"><div><p class="section-kicker">Context actions</p><h3>Desired vs observed</h3></div><span class="badge" id="context-badge">idle</span></div>
                <div class="data-list" id="context-actions-list"></div>
              </div>
            </aside>
          </section>
        </main>
    
        <dialog id="command-dialog" class="command-dialog">
          <form method="dialog" class="command-dialog-form">
            <h3 id="command-dialog-title">Confirm action</h3>
            <p id="command-dialog-body">Review the requested action.</p>
            <label>
              <span>Reason</span>
              <input id="command-reason-input" type="text" placeholder="Required for high-risk actions">
            </label>
            <menu>
              <button type="submit" value="cancel">Cancel</button>
              <button type="submit" value="confirm" id="command-confirm-button">Submit</button>
            </menu>
          </form>
        </dialog>
    
        <script src="./app.js"></script>
      </body>
    </html>
  styles.css: |
    :root {
      --bg: #061018;
      --bg-deep: #03070d;
      --panel: rgba(10, 20, 30, 0.88);
      --panel-strong: rgba(12, 26, 39, 0.96);
      --panel-soft: rgba(14, 31, 45, 0.78);
      --text: #edf3f8;
      --muted: #91a5b8;
      --muted-strong: #bfd0df;
      --line: rgba(140, 164, 184, 0.18);
      --line-strong: rgba(165, 190, 211, 0.26);
      --accent: #8bb8ff;
      --accent-soft: rgba(139, 184, 255, 0.14);
      --ok: #4dd3a7;
      --warn: #ffbf66;
      --danger: #ff7a5c;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.38);
    }
    
    * {
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "IBM Plex Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 12%, rgba(72, 118, 186, 0.22), transparent 28%),
        radial-gradient(circle at 90% 18%, rgba(27, 68, 109, 0.2), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(69, 135, 110, 0.12), transparent 32%),
        linear-gradient(165deg, #08131d 0%, var(--bg-deep) 72%);
    }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.02));
      pointer-events: none;
    }
    
    .backdrop,
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    
    .backdrop {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(circle at center, black 36%, transparent 88%);
      opacity: 0.5;
    }
    
    .noise {
      opacity: 0.08;
      background-image: radial-gradient(rgba(255, 255, 255, 0.9) 0.5px, transparent 0.5px);
      background-size: 8px 8px;
    }
    
    .shell {
      position: relative;
      width: min(1380px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }
    
    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(14, 27, 40, 0.94), rgba(8, 16, 24, 0.94));
      box-shadow: var(--shadow);
    }
    
    .panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 24%, transparent 76%, rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }
    
    .panel-tint {
      background: linear-gradient(180deg, rgba(16, 34, 49, 0.96), rgba(9, 18, 28, 0.94));
    }
    
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 28px;
    }
    
    .eyebrow,
    .section-kicker,
    .badge,
    .metric-label,
    .meta-label,
    .service-role,
    .service-name,
    .detail-grid dt,
    .guardrail-index {
      font-family: "IBM Plex Mono", monospace;
      letter-spacing: 0.06em;
    }
    
    .eyebrow,
    .section-kicker {
      margin: 0;
      color: var(--accent);
      font-size: 0.74rem;
      text-transform: uppercase;
    }
    
    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    
    h1,
    h2,
    h3,
    p {
      margin: 0;
    }
    
    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }
    
    h2 {
      max-width: 12ch;
      font-size: clamp(2.1rem, 5vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    
    h3 {
      margin-top: 10px;
      font-size: 1.3rem;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }
    
    .topbar-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 12px;
    }
    
    .meta-chip,
    .metric-card,
    .monitor-card,
    .service-card,
    .guardrail-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
    }
    
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 999px;
      color: var(--muted-strong);
    }
    
    .meta-chip strong {
      font-size: 0.92rem;
      font-weight: 600;
    }
    
    .auth-chip {
      min-width: min(100%, 360px);
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
    }
    
    .auth-chip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    
    .auth-chip-head strong {
      font-size: 0.92rem;
    }
    
    .auth-chip-form {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    
    .auth-chip-form input,
    .auth-chip-form button {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: rgba(7, 15, 24, 0.92);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
    }
    
    .auth-chip-form button {
      cursor: pointer;
      background: rgba(139, 184, 255, 0.16);
    }
    
    .auth-chip-form button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    
    .auth-chip-detail {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }
    
    .auth-permissions-list {
      margin-top: 12px;
    }
    
    .control-form {
      margin-top: 18px;
    }
    
    .control-actions {
      margin-top: 14px;
      flex-wrap: wrap;
    }
    
    .control-actions button {
      min-width: 132px;
    }
    
    .meta-label,
    .metric-label {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
    }
    
    .pulse-chip {
      background: rgba(77, 211, 167, 0.08);
    }
    
    .pulse-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--ok);
      box-shadow: 0 0 16px rgba(77, 211, 167, 0.8);
    }
    
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.95fr);
      gap: 24px;
      margin-top: 18px;
      padding: 30px;
    }
    
    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 320px;
      padding-right: 20px;
    }
    
    .lead,
    .panel-copy,
    .service-status,
    .monitor-card p,
    .guardrail-item p {
      color: var(--muted);
      line-height: 1.7;
    }
    
    .lead {
      max-width: 60ch;
      margin-top: 22px;
      font-size: 1rem;
    }
    
    .hero-aside {
      display: grid;
      gap: 16px;
      align-content: stretch;
    }
    
    .hero-summary {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 160px;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid var(--line-strong);
      background: linear-gradient(180deg, rgba(20, 41, 58, 0.95), rgba(10, 21, 31, 0.95));
    }
    
    .hero-summary strong {
      font-size: clamp(1.6rem, 3vw, 2.4rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    
    .metric-grid,
    .monitor-grid,
    .guardrail-grid,
    .service-grid,
    .dashboard-grid {
      display: grid;
      gap: 16px;
    }
    
    .metric-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    
    .metric-card {
      min-height: 108px;
      padding: 18px;
      border-radius: 22px;
    }
    
    .metric-card strong,
    .monitor-card strong {
      display: block;
      margin-top: 12px;
      font-size: 1.25rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }
    
    .caution-card {
      background: linear-gradient(180deg, rgba(45, 31, 13, 0.86), rgba(24, 16, 9, 0.94));
    }
    
    .dashboard-grid {
      grid-template-columns: repeat(12, minmax(0, 1fr));
      margin-top: 18px;
    }
    
    .panel-span-4,
    .panel-span-8,
    .panel-span-12 {
      padding: 24px;
    }
    
    .panel-span-4 {
      grid-column: span 4;
    }
    
    .panel-span-8 {
      grid-column: span 8;
    }
    
    .panel-span-12 {
      grid-column: span 12;
    }
    
    .panel-header,
    .service-head,
    .list-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }
    
    .panel-copy {
      margin-top: 16px;
    }
    
    .service-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 18px;
    }
    
    .service-card {
      position: relative;
      padding: 20px;
      border-radius: 22px;
    }
    
    .service-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: rgba(255, 255, 255, 0.08);
    }
    
    .service-card.ready::before {
      background: var(--ok);
    }
    
    .service-card.degraded::before {
      background: var(--warn);
    }
    
    .service-name {
      color: var(--muted-strong);
      font-size: 0.78rem;
      text-transform: uppercase;
    }
    
    .service-role {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
    }
    
    .service-status {
      margin-top: 18px;
      min-height: 72px;
    }
    
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    
    .detail-grid div {
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    
    .detail-grid dt {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
    }
    
    .detail-grid dd {
      margin: 8px 0 0;
      color: var(--muted-strong);
      font-size: 0.92rem;
    }
    
    .stack-list {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }
    
    .proposal-console {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }
    
    .proposal-list {
      display: grid;
      gap: 10px;
    }
    
    .proposal-list-item,
    .proposal-actions button,
    .proposal-form input {
      font: inherit;
    }
    
    .proposal-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted-strong);
      cursor: pointer;
    }
    
    .proposal-list-item.is-selected {
      border-color: rgba(139, 184, 255, 0.4);
      background: rgba(139, 184, 255, 0.1);
    }
    
    .proposal-empty,
    .proposal-action-state,
    .proposal-detail-copy {
      color: var(--muted);
      line-height: 1.6;
    }
    
    .proposal-detail {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.025);
    }
    
    .proposal-detail-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    
    .proposal-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    
    .proposal-meta div {
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    
    .proposal-meta dt {
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    
    .proposal-meta dd {
      margin: 8px 0 0;
      color: var(--muted-strong);
    }
    
    .proposal-form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    
    .proposal-form label {
      display: grid;
      gap: 8px;
    }
    
    .proposal-form span {
