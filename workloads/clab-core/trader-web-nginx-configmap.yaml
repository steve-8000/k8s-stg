apiVersion: v1
kind: ConfigMap
metadata:
  name: trader-web-nginx
  namespace: clab-core
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
      }

      location /api/market-data/ {
        rewrite ^/api/market-data/(.*)$ /$1 break;
        proxy_pass http://market-data.clab-core.svc.cluster.local;
      }

      location /api/feature-pipeline/ {
        rewrite ^/api/feature-pipeline/(.*)$ /$1 break;
        proxy_pass http://feature-pipeline.clab-core.svc.cluster.local;
      }

      location /api/strategy-engine/ {
        rewrite ^/api/strategy-engine/(.*)$ /$1 break;
        proxy_pass http://strategy-engine.clab-core.svc.cluster.local;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
