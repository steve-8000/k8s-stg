apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - feature-pipeline-service.yaml
  - feature-pipeline-deployment.yaml
  - gateway-service.yaml
  - gateway-deployment.yaml
  - market-data-service.yaml
  - market-data-deployment.yaml
  - execution-router-service.yaml
  - execution-router-deployment.yaml
  - order-manager-service.yaml
  - order-manager-deployment.yaml
  - portfolio-engine-service.yaml
  - portfolio-engine-deployment.yaml
  - portfolio-canonical-state-service.yaml
  - portfolio-canonical-state-deployment.yaml
  - positions-ledger-service.yaml
  - positions-ledger-deployment.yaml
  - promotion-gate-policy-configmap.yaml
  - promotion-gate-service.yaml
  - promotion-gate-deployment.yaml
  - research-labs-service.yaml
  - research-labs-deployment.yaml
  - projection-worker-service.yaml
  - projection-worker-deployment.yaml
  - proposal-service-service.yaml
  - proposal-service-deployment.yaml
  - query-api-service.yaml
  - query-api-deployment.yaml
  - reconciliation-service.yaml
  - reconciliation-deployment.yaml
  - realtime-gateway-service.yaml
  - realtime-gateway-deployment.yaml
  - risk-engine-service.yaml
  - risk-engine-deployment.yaml
  - strategy-engine-service.yaml
  - strategy-engine-deployment.yaml
  - trader-web-nginx-configmap.yaml
  - trader-web-service.yaml
  - trader-web-deployment.yaml
  - trade-ingress.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: trader-web-assets
    namespace: clab-core
    files:
      - trader-web/index.html
      - trader-web/app.js
      - trader-web/styles.css
      - trader-web/verification.html
      - trader-web/verification.js
      - trader-web/verification.css
