apiVersion: apps/v1
kind: Deployment
metadata:
  name: research-labs
  namespace: clab-core
  labels:
    app.kubernetes.io/name: research-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: research-labs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: research-labs
    spec:
      containers:
        - name: research-labs
          image: clab-trade/research-labs:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: RESEARCH_LABS_HTTP_ADDR
              value: :8095
            - name: RESEARCH_LABS_PROMOTION_GATE_URL
              value: http://promotion-gate.clab-core.svc.cluster.local
          ports:
            - name: http
              containerPort: 8095
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
