apiVersion: apps/v1
kind: Deployment
metadata:
  name: proposal-service
  namespace: clab-core
  labels:
    app.kubernetes.io/name: proposal-service
    app.kubernetes.io/instance: proposal-service-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: proposal-service
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proposal-service
        app.kubernetes.io/instance: proposal-service-stg
    spec:
      containers:
        - name: proposal-service
          image: clab-trade/proposal-service:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: PROPOSAL_SERVICE_HTTP_ADDR
              value: :8084
            - name: PROPOSAL_SERVICE_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: PROPOSAL_SERVICE_SOURCE_STREAM
              value: SIGNAL_DATA
            - name: PROPOSAL_SERVICE_CONSUMER
              value: proposal-service
          ports:
            - name: http
              containerPort: 8084
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
