apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: clab-core
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: gateway-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: gateway-stg
    spec:
      containers:
        - name: gateway
          image: clab-trade/gateway:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: GATEWAY_HTTP_ADDR
              value: :8090
            - name: GATEWAY_MARKET_DATA_URL
              value: http://market-data.clab-core.svc.cluster.local
            - name: GATEWAY_FEATURE_PIPELINE_URL
              value: http://feature-pipeline.clab-core.svc.cluster.local
            - name: GATEWAY_STRATEGY_ENGINE_URL
              value: http://strategy-engine.clab-core.svc.cluster.local
            - name: GATEWAY_PORTFOLIO_ENGINE_URL
              value: http://portfolio-engine.clab-core.svc.cluster.local
            - name: GATEWAY_POSITIONS_LEDGER_URL
              value: http://positions-ledger.clab-core.svc.cluster.local
            - name: GATEWAY_RECONCILIATION_URL
              value: http://reconciliation.clab-core.svc.cluster.local
            - name: GATEWAY_PROPOSAL_SERVICE_URL
              value: http://proposal-service.clab-core.svc.cluster.local
            - name: GATEWAY_RISK_ENGINE_URL
              value: http://risk-engine.clab-core.svc.cluster.local
            - name: GATEWAY_ORDER_MANAGER_URL
              value: http://order-manager.clab-core.svc.cluster.local
            - name: GATEWAY_EXECUTION_ROUTER_URL
              value: http://execution-router.clab-core.svc.cluster.local
            - name: GATEWAY_AUTH_SERVICE_URL
              value: http://auth-service.clab-apps.svc.cluster.local
            - name: GATEWAY_USER_SERVICE_URL
              value: http://user-service.clab-apps.svc.cluster.local
            - name: GATEWAY_OPS_CONSOLE_API_URL
              value: http://ops-console-api.clab-apps.svc.cluster.local
            - name: GATEWAY_NOTIFICATION_SERVICE_URL
              value: http://notification-service.clab-apps.svc.cluster.local
            - name: GATEWAY_CONTROL_SERVICE_URL
              value: http://control-service.clab-apps.svc.cluster.local
            - name: GATEWAY_PORTFOLIO_CANONICAL_STATE_URL
              value: http://portfolio-canonical-state.clab-core.svc.cluster.local
            - name: GATEWAY_QUERY_API_URL
              value: http://query-api.clab-core.svc.cluster.local
            - name: GATEWAY_PROJECTION_WORKER_URL
              value: http://projection-worker.clab-core.svc.cluster.local
            - name: GATEWAY_REALTIME_GATEWAY_URL
              value: http://realtime-gateway.clab-core.svc.cluster.local
            - name: GATEWAY_PROMOTION_GATE_URL
              value: http://promotion-gate.clab-core.svc.cluster.local
            - name: GATEWAY_RESEARCH_LABS_URL
              value: http://research-labs.clab-core.svc.cluster.local
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
