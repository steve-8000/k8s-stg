apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy-engine
  namespace: clab-core
  labels:
    app.kubernetes.io/name: strategy-engine
    app.kubernetes.io/instance: strategy-engine-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: strategy-engine
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: strategy-engine
        app.kubernetes.io/instance: strategy-engine-stg
    spec:
      containers:
        - name: strategy-engine
          image: clab-trade/strategy-engine:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: STRATEGY_ENGINE_HTTP_ADDR
              value: :8082
            - name: STRATEGY_ENGINE_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: STRATEGY_ENGINE_SOURCE_STREAM
              value: FEATURE_DATA
            - name: STRATEGY_ENGINE_CONSUMER
              value: strategy-engine
            - name: STRATEGY_ENGINE_SPREAD_THRESHOLD
              value: "1.5"
          ports:
            - name: http
              containerPort: 8082
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
