apiVersion: apps/v1
kind: Deployment
metadata:
  name: trader-web
  namespace: clab-core
  labels:
    app.kubernetes.io/name: trader-web
    app.kubernetes.io/instance: trader-web-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: trader-web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trader-web
        app.kubernetes.io/instance: trader-web-stg
    spec:
      containers:
        - name: trader-web
          image: nginx:1.29-alpine
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: assets
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: assets
              mountPath: /usr/share/nginx/html/styles.css
              subPath: styles.css
            - name: assets
              mountPath: /usr/share/nginx/html/app.js
              subPath: app.js
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: assets
          configMap:
            name: trader-web-assets
        - name: nginx-config
          configMap:
            name: trader-web-nginx
