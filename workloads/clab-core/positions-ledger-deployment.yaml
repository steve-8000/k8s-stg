apiVersion: apps/v1
kind: Deployment
metadata:
  name: positions-ledger
  namespace: clab-core
  labels:
    app.kubernetes.io/name: positions-ledger
    app.kubernetes.io/instance: positions-ledger-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: positions-ledger
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: positions-ledger
        app.kubernetes.io/instance: positions-ledger-stg
    spec:
      containers:
        - name: positions-ledger
          image: clab-trade/positions-ledger:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: POSITIONS_LEDGER_HTTP_ADDR
              value: :8088
            - name: POSITIONS_LEDGER_NATS_URL
              value: nats://nats.clab-system.svc.cluster.local:4222
            - name: POSITIONS_LEDGER_SOURCE_STREAM
              value: EXECUTION_EVENT_DATA
            - name: POSITIONS_LEDGER_CONSUMER
              value: positions-ledger
          ports:
            - name: http
              containerPort: 8088
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
