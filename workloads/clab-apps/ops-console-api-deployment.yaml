apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-console-api
  namespace: clab-apps
  labels:
    app.kubernetes.io/name: ops-console-api
    app.kubernetes.io/instance: ops-console-api-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: ops-console-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ops-console-api
        app.kubernetes.io/instance: ops-console-api-stg
    spec:
      containers:
        - name: ops-console-api
          image: clab-trade/ops-console-api:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: OPS_CONSOLE_API_HTTP_ADDR
              value: :8093
            - name: OPS_CONSOLE_API_USER_SERVICE_URL
              value: http://user-service.clab-apps.svc.cluster.local
            - name: OPS_CONSOLE_API_PORTFOLIO_ENGINE_URL
              value: http://portfolio-engine.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_PROPOSAL_SERVICE_URL
              value: http://proposal-service.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_RISK_ENGINE_URL
              value: http://risk-engine.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_ORDER_MANAGER_URL
              value: http://order-manager.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_EXECUTION_ROUTER_URL
              value: http://execution-router.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_RECONCILIATION_URL
              value: http://reconciliation.clab-core.svc.cluster.local
            - name: OPS_CONSOLE_API_NOTIFICATION_SERVICE_URL
              value: http://notification-service.clab-apps.svc.cluster.local
          ports:
            - name: http
              containerPort: 8093
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
