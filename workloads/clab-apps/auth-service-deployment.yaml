apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: clab-apps
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/instance: auth-service-stg
    spec:
      containers:
        - name: auth-service
          image: clab-trade/auth-service:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: AUTH_SERVICE_HTTP_ADDR
              value: :8091
            - name: AUTH_SERVICE_ISSUER
              value: clab-auth
            - name: AUTH_SERVICE_SIGNING_SECRET
              value: clab-auth-staging-secret-change-me
            - name: AUTH_SERVICE_ACCESS_TOKEN_TTL
              value: 15m
            - name: AUTH_SERVICE_STEP_UP_TOKEN_TTL
              value: 5m
            - name: AUTH_SERVICE_BOOTSTRAP_USERNAME
              value: operator
            - name: AUTH_SERVICE_BOOTSTRAP_PASSWORD
              value: operator-pass
            - name: AUTH_SERVICE_BOOTSTRAP_ROLE
              value: operator
            - name: AUTH_SERVICE_BOOTSTRAP_PERMISSIONS
              value: strategy.start,strategy.stop,audit.read,proposal.review,trading.kill_switch,trading.cancel_all,trading.flatten_positions
          ports:
            - name: http
              containerPort: 8091
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
