apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: clab-apps
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/instance: notification-service-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/instance: notification-service-stg
    spec:
      containers:
        - name: notification-service
          image: clab-trade/notification-service:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CLAB_ENV
              value: staging
            - name: CLAB_VENUE
              value: binance
            - name: NOTIFICATION_SERVICE_HTTP_ADDR
              value: :8094
            - name: NOTIFICATION_SERVICE_RECONCILIATION_URL
              value: http://reconciliation.clab-core.svc.cluster.local
            - name: NOTIFICATION_SERVICE_PROPOSAL_SERVICE_URL
              value: http://proposal-service.clab-core.svc.cluster.local
          ports:
            - name: http
              containerPort: 8094
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
