apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: claw
  labels:
    app.kubernetes.io/name: claw
data:
  openclaw.json: |
    {
      "models": {
        "providers": {
          "ollama": {
            "baseUrl": "http://219.255.103.189:11434",
            "apiKey": "ollama-local",
            "api": "ollama",
            "models": [
              {
                "id": "qwen35-opus-distilled-openclaw:latest",
                "name": "qwen35-opus-distilled-openclaw",
                "reasoning": false,
                "input": [
                  "text"
                ],
                "cost": {
                  "input": 0,
                  "output": 0,
                  "cacheRead": 0,
                  "cacheWrite": 0
                },
                "contextWindow": 65536,
                "maxTokens": 8192
              }
            ]
          }
        }
      },
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "https://claw.clab.one"
          ]
        }
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen35-opus-distilled-openclaw:latest"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": {
        "enabled": false
      }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running at claw.clab.one.
