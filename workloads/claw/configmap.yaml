apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: claw
  labels:
    app.kubernetes.io/name: claw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": [
            "https://claw.clab.one"
          ]
        }
      },
      "session": {
        "dmScope": "per-channel-peer"
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": {
        "enabled": false
      }
    }
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running at claw.clab.one.
