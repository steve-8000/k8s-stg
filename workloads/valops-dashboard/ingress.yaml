apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: valops-dashboard-ingress
  namespace: valops-dashboard
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ff.clab.one
      secretName: ff-clab-one-tls
  rules:
    - host: ff.clab.one
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: valops-dashboard
                port:
                  number: 80
