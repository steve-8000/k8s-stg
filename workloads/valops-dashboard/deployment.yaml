apiVersion: apps/v1
kind: Deployment
metadata:
  name: valops-dashboard
  namespace: valops-dashboard
  labels:
    app.kubernetes.io/name: valops-dashboard
    app.kubernetes.io/instance: valops-dashboard-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: valops-dashboard
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valops-dashboard
        app.kubernetes.io/instance: valops-dashboard-stg
    spec:
      containers:
        - name: valops-dashboard
          image: docker.io/library/valops-dashboard:v20
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: valops-env
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
