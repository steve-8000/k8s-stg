# Template for clab-trading-center config secret.
# Copy this file, fill in values, and apply:
#   kubectl apply -f config-secret.yaml
#
# DO NOT commit the filled-in version to git.
apiVersion: v1
kind: Secret
metadata:
  name: clab-trading-center-config
  namespace: clab-trading-center
type: Opaque
stringData:
  config.json: |
    {
      "aiProvider": {
        "backend": "vercel-ai-sdk",
        "provider": "anthropic",
        "model": "claude-sonnet-4-6",
        "apiKeys": {
          "anthropic": "sk-ant-..."
        }
      },
      "connectors": {
        "web": { "port": 3002 },
        "telegram": { "enabled": false }
      }
    }
