apiVersion: apps/v1
kind: Deployment
metadata:
  name: clab-trading-center
  namespace: clab-trading-center
  labels:
    app.kubernetes.io/name: clab-trading-center
    app.kubernetes.io/instance: clab-trading-center-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: clab-trading-center
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clab-trading-center
        app.kubernetes.io/instance: clab-trading-center-stg
    spec:
      containers:
        - name: clab-trading-center
          image: docker.io/library/clab-trading-center:v2
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "20"
              memory: 48Gi
          env:
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: config
              mountPath: /app/data/config
            - name: sessions
              mountPath: /app/data/sessions
            - name: brain
              mountPath: /app/data/brain
            - name: trading
              mountPath: /app/data/trading
            - name: event-log
              mountPath: /app/data/event-log
            - name: media
              mountPath: /app/data/media
            - name: market-data
              mountPath: /app/data/market-data
            - name: strategy
              mountPath: /app/data/strategy
            - name: auth
              mountPath: /app/data/auth
            - name: cron
              mountPath: /app/data/cron
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          hostPath:
            path: /opt/clab-trading-center/config
            type: DirectoryOrCreate
        - name: sessions
          hostPath:
            path: /opt/clab-trading-center/sessions
            type: DirectoryOrCreate
        - name: brain
          hostPath:
            path: /opt/clab-trading-center/brain
            type: DirectoryOrCreate
        - name: trading
          hostPath:
            path: /opt/clab-trading-center/trading
            type: DirectoryOrCreate
        - name: event-log
          hostPath:
            path: /opt/clab-trading-center/event-log
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /opt/clab-trading-center/media
            type: DirectoryOrCreate
        - name: market-data
          hostPath:
            path: /opt/clab-trading-center/market-data
            type: DirectoryOrCreate
        - name: strategy
          hostPath:
            path: /opt/clab-trading-center/strategy
            type: DirectoryOrCreate
        - name: auth
          hostPath:
            path: /opt/clab-trading-center/auth
            type: DirectoryOrCreate
        - name: cron
          hostPath:
            path: /opt/clab-trading-center/cron
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /opt/clab-trading-center/logs
            type: DirectoryOrCreate
