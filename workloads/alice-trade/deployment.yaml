apiVersion: apps/v1
kind: Deployment
metadata:
  name: alice-trade
  namespace: alice-trade
  labels:
    app.kubernetes.io/name: alice-trade
    app.kubernetes.io/instance: alice-trade-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: alice-trade
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alice-trade
        app.kubernetes.io/instance: alice-trade-stg
    spec:
      containers:
        - name: alice-trade
          image: docker.io/library/alice-trade:v3
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          env:
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: config
              mountPath: /app/data/config
            - name: sessions
              mountPath: /app/data/sessions
            - name: brain
              mountPath: /app/data/brain
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          secret:
            secretName: alice-trade-config
            optional: true
        - name: sessions
          hostPath:
            path: /opt/alice-trade/sessions
            type: DirectoryOrCreate
        - name: brain
          hostPath:
            path: /opt/alice-trade/brain
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /opt/alice-trade/logs
            type: DirectoryOrCreate
