apiVersion: apps/v1
kind: Deployment
metadata:
  name: alice-trade
  namespace: alice-trade
  labels:
    app.kubernetes.io/name: alice-trade
    app.kubernetes.io/instance: alice-trade-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: alice-trade
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alice-trade
        app.kubernetes.io/instance: alice-trade-stg
    spec:
      containers:
        - name: alice-trade
          image: docker.io/library/alice-trade:v52
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3002
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "20"
              memory: 48Gi
          env:
            - name: NODE_ENV
              value: production
          volumeMounts:
            - name: config
              mountPath: /app/data/config
            - name: sessions
              mountPath: /app/data/sessions
            - name: brain
              mountPath: /app/data/brain
            - name: trading
              mountPath: /app/data/trading
            - name: event-log
              mountPath: /app/data/event-log
            - name: media
              mountPath: /app/data/media
            - name: market-data
              mountPath: /app/data/market-data
            - name: strategy
              mountPath: /app/data/strategy
            - name: auth
              mountPath: /app/data/auth
            - name: cron
              mountPath: /app/data/cron
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          hostPath:
            path: /opt/alice-trade/config
            type: DirectoryOrCreate
        - name: sessions
          hostPath:
            path: /opt/alice-trade/sessions
            type: DirectoryOrCreate
        - name: brain
          hostPath:
            path: /opt/alice-trade/brain
            type: DirectoryOrCreate
        - name: trading
          hostPath:
            path: /opt/alice-trade/trading
            type: DirectoryOrCreate
        - name: event-log
          hostPath:
            path: /opt/alice-trade/event-log
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /opt/alice-trade/media
            type: DirectoryOrCreate
        - name: market-data
          hostPath:
            path: /opt/alice-trade/market-data
            type: DirectoryOrCreate
        - name: strategy
          hostPath:
            path: /opt/alice-trade/strategy
            type: DirectoryOrCreate
        - name: auth
          hostPath:
            path: /opt/alice-trade/auth
            type: DirectoryOrCreate
        - name: cron
          hostPath:
            path: /opt/alice-trade/cron
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: /opt/alice-trade/logs
            type: DirectoryOrCreate
