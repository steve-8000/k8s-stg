apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: docker.io/clab/dashboard:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: CONTROL_PLANE_URL
              value: "http://control-plane:8000"
            - name: KNOWLEDGE_URL
              value: "http://knowledge-service:4007"
            - name: CODE_INTEL_URL
              value: "http://code-intel:4010"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: clab-platform
spec:
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: clab-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ai.clab.one
      secretName: ai-clab-one-tls
  rules:
    - host: ai.clab.one
      http:
        paths:
          - path: /api/cp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: control-plane
                port:
                  number: 8000
          - path: /api/ks(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: knowledge-service
                port:
                  number: 4007
          - path: /api/ci(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: code-intel
                port:
                  number: 4010
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: clab-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ai.clab.one
      secretName: ai-clab-one-tls
  rules:
    - host: ai.clab.one
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
