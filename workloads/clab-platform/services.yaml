# --- Control Plane (FastAPI + PostgreSQL) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U clab; do sleep 2; done"]
      containers:
        - name: control-plane
          image: docker.io/clab/control-plane:v5
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: clab-env
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: clab-platform
spec:
  selector:
    app: control-plane
  ports:
    - port: 8000
      targetPort: 8000
---
# --- Knowledge Service (Go) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-service
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-service
  template:
    metadata:
      labels:
        app: knowledge-service
    spec:
      containers:
        - name: knowledge-service
          image: docker.io/clab/knowledge-service:v10
          imagePullPolicy: Never
          ports:
            - containerPort: 4007
          env:
            - name: PORT
              value: "4007"
          envFrom:
            - configMapRef:
                name: clab-env
          readinessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-service
  namespace: clab-platform
spec:
  selector:
    app: knowledge-service
  ports:
    - port: 4007
      targetPort: 4007
