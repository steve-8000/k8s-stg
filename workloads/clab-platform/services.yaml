# --- API Gateway ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: docker.io/clab/api-gateway:v6
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
          envFrom:
            - configMapRef:
                name: clab-env
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: clab-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
---
# --- Mission Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: docker.io/clab/orchestrator:v4
          imagePullPolicy: Never
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
          envFrom:
            - configMapRef:
                name: clab-env
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: clab-platform
spec:
  selector:
    app: orchestrator
  ports:
    - port: 4001
      targetPort: 4001
