apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-agents-apiserver
  namespace: k8s-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-agents-apiserver
  template:
    metadata:
      labels:
        app: k8s-agents-apiserver
    spec:
      serviceAccountName: k8s-agents
      containers:
        - name: apiserver
          image: k8sagents/apiserver:v1.0.2
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LLM_ENDPOINT
              value: "http://219.255.103.226:11434/v1"
            - name: LLM_MODEL
              value: "qwen3.5:9b"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
