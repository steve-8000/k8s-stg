apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api
  namespace: polybase-trading
  labels:
    app.kubernetes.io/name: dashboard-api
    app.kubernetes.io/instance: dashboard-api-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard-api
        app.kubernetes.io/instance: dashboard-api-stg
    spec:
      containers:
        - name: dashboard-api
          image: ghcr.io/steve-8000/clab-polybase-binance/dashboard-api:v1773477565
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: prod
            - name: APP__NATS__URL
              value: "nats://nats.polybase-infra.svc.cluster.local:4222"
            - name: APP__REDIS__URL
              value: "redis://redis.polybase-infra.svc.cluster.local:6379"
            - name: APP__CLICKHOUSE__URL
              value: "http://clickhouse.polybase-infra.svc.cluster.local:8123"
            - name: APP__CLICKHOUSE__DATABASE
              value: trading
            - name: RUST_LOG
              value: info
            - name: ORDERS_DB_PATH
              value: /data/orders.db
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /opt/polybase-trading/dashboard-data
            type: DirectoryOrCreate
