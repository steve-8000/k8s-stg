apiVersion: apps/v1
kind: Deployment
metadata:
  name: polymarket-ws
  namespace: polybase-trading
  labels:
    app.kubernetes.io/name: polymarket-ws
    app.kubernetes.io/instance: polymarket-ws-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: polymarket-ws
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: polymarket-ws
        app.kubernetes.io/instance: polymarket-ws-stg
    spec:
      containers:
        - name: polymarket-ws
          image: ghcr.io/steve-8000/clab-polybase-binance/polymarket-ws:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: prod
            - name: APP__NATS__URL
              value: "nats://nats.polybase-infra.svc.cluster.local:4222"
            - name: APP__REDIS__URL
              value: "redis://redis.polybase-infra.svc.cluster.local:6379"
            - name: APP__CLICKHOUSE__URL
              value: "http://clickhouse.polybase-infra.svc.cluster.local:8123"
            - name: APP__CLICKHOUSE__DATABASE
              value: trading
            - name: RUST_LOG
              value: info
          ports:
            - name: metrics
              containerPort: 9090
