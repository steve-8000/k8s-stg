apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-engine
  namespace: polybase-trading
  labels:
    app.kubernetes.io/name: signal-engine
    app.kubernetes.io/instance: signal-engine-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: signal-engine
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signal-engine
        app.kubernetes.io/instance: signal-engine-stg
    spec:
      containers:
        - name: signal-engine
          image: ghcr.io/steve-8000/clab-polybase-binance/signal-engine:latest
          imagePullPolicy: Always
          env:
            - name: APP_ENV
              value: prod
            - name: APP__NATS__URL
              value: "nats://nats.polybase-infra.svc.cluster.local:4222"
            - name: APP__REDIS__URL
              value: "redis://redis.polybase-infra.svc.cluster.local:6379"
            - name: APP__CLICKHOUSE__URL
              value: "http://clickhouse.polybase-infra.svc.cluster.local:8123"
            - name: APP__CLICKHOUSE__DATABASE
              value: trading
            - name: RUST_LOG
              value: info
          ports:
            - name: metrics
              containerPort: 9090
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
