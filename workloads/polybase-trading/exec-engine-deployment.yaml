apiVersion: apps/v1
kind: Deployment
metadata:
  name: exec-engine
  namespace: polybase-trading
  labels:
    app.kubernetes.io/name: exec-engine
    app.kubernetes.io/instance: exec-engine-stg
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: exec-engine
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exec-engine
        app.kubernetes.io/instance: exec-engine-stg
    spec:
      containers:
        - name: exec-engine
          image: ghcr.io/steve-8000/clab-polybase-binance/exec-engine:v1773480606
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: prod
            - name: APP__NATS__URL
              value: "nats://nats.polybase-infra.svc.cluster.local:4222"
            - name: APP__REDIS__URL
              value: "redis://redis.polybase-infra.svc.cluster.local:6379"
            - name: APP__CLICKHOUSE__URL
              value: "http://clickhouse.polybase-infra.svc.cluster.local:8123"
            - name: APP__CLICKHOUSE__DATABASE
              value: trading
            - name: APP__BINANCE__REST_URL
              value: "https://fapi.binance.com"
            - name: APP__BINANCE__WS_URL
              value: "wss://fstream.binance.com"
            - name: APP__BINANCE__SYMBOL
              value: ETHUSDT
            - name: APP__BINANCE__PAPER_TRADING
              value: "true"
            - name: APP__BINANCE__INITIAL_BALANCE
              value: "500.0"
            - name: APP__BINANCE__MAX_LEVERAGE
              value: "10"
            - name: RUST_LOG
              value: info
          # envFrom:
          #   - secretRef:
          #       name: binance-api-credentials  # Enable when switching to live trading
          ports:
            - name: metrics
              containerPort: 9090
